version: "0.4"

blueprint:
  name: docker-suds-dev
  title: "Docker Dev — SUDS v2 PostgreSQL"
  description: "Manage the SUDS v2 development PostgreSQL container (postgres:16-alpine on port 5433)"
  author: mentat
  tags: [docker, suds, postgres, dev]

inputs:
  - name: project_path
    type: string
    default: "~/Projects-apps/suds-v2"
    description: "Path to the SUDS v2 project root"

  - name: action
    type: string
    default: "status"
    description: "Action: start, stop, status, logs, reset"

steps:
  - section: Start PostgreSQL
    condition: "{{ eq .inputs.action \"start\" }}"
    tasks:
      - name: start-postgres
        cmd: |
          cd {{ .inputs.project_path }}
          docker compose -f docker-compose.dev.yml up -d
          echo "Waiting for PostgreSQL to be ready..."
          for i in $(seq 1 10); do
            if docker compose -f docker-compose.dev.yml exec -T postgres pg_isready -U suds -d suds_v2 2>/dev/null; then
              echo ""
              echo "PostgreSQL is ready."
              echo "  Host: localhost:5433"
              echo "  User: suds"
              echo "  DB:   suds_v2"
              exit 0
            fi
            sleep 1
          done
          echo "Warning: PostgreSQL did not become ready within 10 seconds."
          docker compose -f docker-compose.dev.yml ps
        timeout_seconds: 120

  - section: Stop PostgreSQL
    condition: "{{ eq .inputs.action \"stop\" }}"
    tasks:
      - name: stop-postgres
        cmd: |
          cd {{ .inputs.project_path }}
          docker compose -f docker-compose.dev.yml down
          echo "SUDS dev PostgreSQL stopped."

  - section: Status
    condition: "{{ eq .inputs.action \"status\" }}"
    tasks:
      - name: check-status
        cmd: |
          cd {{ .inputs.project_path }}
          docker compose -f docker-compose.dev.yml ps
          echo ""
          if docker compose -f docker-compose.dev.yml exec -T postgres pg_isready -U suds -d suds_v2 2>/dev/null; then
            echo "PostgreSQL: healthy (localhost:5433)"
          else
            echo "PostgreSQL: not running"
          fi

  - section: Show Logs
    condition: "{{ eq .inputs.action \"logs\" }}"
    tasks:
      - name: show-logs
        cmd: |
          cd {{ .inputs.project_path }}
          docker compose -f docker-compose.dev.yml logs --tail=50 postgres

  - section: Reset Database
    condition: "{{ eq .inputs.action \"reset\" }}"
    tasks:
      - name: reset-db
        cmd: |
          cd {{ .inputs.project_path }}
          echo "Stopping containers and removing volumes..."
          docker compose -f docker-compose.dev.yml down -v
          echo "Starting fresh PostgreSQL..."
          docker compose -f docker-compose.dev.yml up -d
          for i in $(seq 1 10); do
            if docker compose -f docker-compose.dev.yml exec -T postgres pg_isready -U suds -d suds_v2 2>/dev/null; then
              echo ""
              echo "Database reset complete."
              echo "  Host: localhost:5433"
              echo "  User: suds"
              echo "  DB:   suds_v2"
              echo ""
              echo "Run migrations to recreate schema."
              exit 0
            fi
            sleep 1
          done
          echo "Warning: PostgreSQL did not become ready within 10 seconds."
          docker compose -f docker-compose.dev.yml ps
        timeout_seconds: 120
